%YAML:1.0

#common parameters
imu_topic: "/camera/imu"
image_topic: "/camera/color/image_raw"
output_path: "/results/d435i/"
# 输出文件格式已经是TUM格式: timestamp tx ty tz qx qy qz qw

#camera calibration
model_type: PINHOLE
camera_name: camera
image_width: 640
image_height: 480
distortion_parameters:
   k1: 0.1275256064888703
   k2: -0.17537890662616512
   p1: 0.008843650043777473
   p2: -0.013946153749486236
projection_parameters:
   fx: 586.2551467674393
   fy: 585.0446032713918
   cx: 308.8285783212624
   cy: 250.79762362370641

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.
                        # 2  Don't know anything about extrinsic parameters. You don't need to give R,T. We will try to calibrate it. Do some rotation movement at beginning.
ex_calib_result_path: "/config/d435i/ex_calib_result.yaml"

#Rotation from camera frame to imu frame, imu^R_cam (T_imu_cam的旋转部分)
extrinsicRotation: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [0.9997296168385974, -0.0098837220325796, -0.0210476900047239,
          0.0102479554752026, 0.9997983742911989, 0.0172681838435744,
          0.0208727723201907, -0.0174792106074593, 0.9996293335893115]

#Translation from camera frame to imu frame, imu^T_cam (T_imu_cam的平移部分)
extrinsicTranslation: !!opencv-matrix
   rows: 3
   cols: 1
   dt: d
   data: [-0.0292570134134059, -0.0091120938305969, 0.0436561894034853]

#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking
min_dist: 30            # min distance between two features
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 1           # publish tracking image as topic
equalize: 1             # if image is too dark or light, trun on equalize to find enough features
fisheye: 0              # if using fisheye, trun on it. A circle mask will be loaded to remove edge noisy points

#optimization parameters
max_solver_time: 0.06   # max solver itration time (ms), to guarantee real time
max_num_iterations: 10  # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters (来自kalibr标定结果)
acc_n: 1.8600e-03       # accelerometer measurement noise standard deviation
gyr_n: 1.8700e-04       # gyroscope measurement noise standard deviation
acc_w: 4.3300e-04       # accelerometer bias random work noise standard deviation
gyr_w: 2.6600e-05       # gyroscope bias random work noise standard deviation
g_norm: 9.81            # gravity magnitude

#loop closure parameters
loop_closure: 1                 # start loop closure
load_previous_pose_graph: 0     # load and reuse previous pose graph; load from 'pose_graph_save_path'
fast_relocalization: 0          # useful in real-time and large project
pose_graph_save_path: "/results/d435i/"

#unsynchronization parameters
estimate_td: 1                      # online estimate time offset between camera and imu
td: 0.008512879143327233            # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#rolling shutter parameters
rolling_shutter: 0                  # 0: global shutter camera, 1: rolling shutter camera
rolling_shutter_tr: 0               # unit: s. rolling shutter read out time per frame (from data sheet).

#visualization parameters
save_image: 0                   # save image in pose graph for visualization prupose; you can close this function by setting 0
visualize_imu_forward: 0        # output imu forward propogation to achieve low latency and high frequence results
visualize_camera_size: 0.4      # size of camera marker in RVIZ
